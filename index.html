<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>平时成绩保卫战</title>
<link rel="stylesheet" href="stylesheet.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;overflow:hidden;user-select:none;background:#2c1810;width:100vw;height:100vh}
#game-container{width:100vw;height:100vh;position:relative;overflow:hidden}

/* 教室背景 */
#classroom{position:absolute;inset:0;background:linear-gradient(180deg,#f5e6c8 0%,#e8d5a3 100%)}
#classroom .floor{position:absolute;bottom:0;left:0;right:0;height:40%;background:linear-gradient(180deg,rgba(180,150,100,0.4) 0%,#8B7355 60%,#6B5340 100%)}
#classroom .wall-back{position:absolute;top:0;left:0;right:0;height:60%;background:linear-gradient(180deg,#faf0d7 0%,#f0e4c0 100%)}
#classroom .blackboard{position:absolute;top:8%;left:50%;transform:translateX(-50%);width:55%;height:28%;background:linear-gradient(180deg,#2d5a27 0%,#1a3a15 100%);border:14px solid #8B7355;border-radius:6px;box-shadow:0 8px 30px rgba(0,0,0,0.3),inset 0 2px 10px rgba(0,0,0,0.2)}
#classroom .blackboard::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.03) 0%,transparent 50%,rgba(0,0,0,0.05) 100%)}
#classroom .blackboard-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,0.35);font-size:clamp(16px,3vw,32px);font-weight:700;letter-spacing:8px;white-space:nowrap}

/* 多媒体电脑 */
#classroom .multimedia{position:absolute;top:38%;left:50%;transform:translateX(-50%);width:clamp(180px,18vw,260px);height:clamp(120px,10vw,160px);z-index:2}
#classroom .multimedia .screen{width:100%;height:55%;background:linear-gradient(180deg,#1a1a2e 0%,#16213e 100%);border:8px solid #444;border-radius:8px 8px 0 0;position:relative;box-shadow:0 4px 15px rgba(0,0,0,0.4)}
#classroom .multimedia .screen::after{content:'';position:absolute;inset:4px;background:linear-gradient(135deg,rgba(0,200,255,0.06) 0%,transparent 50%,rgba(0,0,0,0.3) 100%);border-radius:3px}
#classroom .multimedia .stand{width:30%;height:45%;background:linear-gradient(180deg,#555 0%,#333 100%);margin:0 auto;border-radius:0 0 6px 6px;box-shadow:0 2px 8px rgba(0,0,0,0.3)}

/* 老师桌子 - 靠右 */
#classroom .teacher-desk{position:absolute;top:48%;right:12%;width:clamp(200px,22vw,320px);height:clamp(80px,8vw,100px);background:linear-gradient(180deg,#c4956a 0%,#a0724a 100%);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.3);z-index:3}
#classroom .teacher-desk::after{content:'';position:absolute;top:4px;left:8px;right:8px;bottom:0;background:linear-gradient(180deg,rgba(255,255,255,0.15) 0%,transparent 30%)}

/* 椅子 - 在老师桌子右边 */
#classroom .chair{position:absolute;top:50%;right:4%;width:clamp(50px,5vw,70px);height:clamp(70px,7vw,90px);z-index:6}
#classroom .chair .seat{width:100%;height:40%;background:#8B6914;border-radius:4px;position:absolute;bottom:30%}
#classroom .chair .backrest{width:16%;height:100%;background:#8B6914;border-radius:3px;position:absolute;left:0;top:0}
#classroom .chair .legs{position:absolute;bottom:0;left:0;right:0;height:30%}
#classroom .chair .leg{width:12%;height:100%;background:#6B4914;border-radius:2px;position:absolute}
#classroom .chair .leg:nth-child(1){left:10%}
#classroom .chair .leg:nth-child(2){right:10%}

/* 老师人物 - 坐在讲台右边，脚翘椅子上 */
#teacher{position:absolute;top:30%;right:16%;z-index:5;transition:all 0.5s ease;display:flex;flex-direction:column;align-items:center}
#teacher .head{position:relative;overflow:visible;z-index:2;margin-bottom:0}
#teacher .head .hair{z-index:1}
#teacher .body-torso{margin:0 auto;position:relative;z-index:2}
#teacher .body-wrapper{position:relative;display:flex;flex-direction:column;align-items:center}
#teacher .arms{position:absolute;top:0;left:50%;transform:translateX(-50%);width:100%;height:0;z-index:4;pointer-events:none}
#teacher .arm{position:absolute}

/* ===== 小萝莉模式 ===== */
#teacher.loli{top:30%}
#teacher.loli .head{width:clamp(48px,5.5vw,76px);height:clamp(46px,5.2vw,72px);background:#ffdbb5;border-radius:50% 50% 45% 45%}
#teacher.loli .head .hair{position:absolute;top:-8px;left:-6px;right:-6px;height:110%;background:linear-gradient(180deg,#4a3728 0%,#5c4433 100%);border-radius:50% 50% 45% 45%}
#teacher.loli .head .hair::before{content:'';position:absolute;top:0;left:10%;width:80%;height:30%;background:#5c4433;border-radius:0 0 50% 50%}
#teacher.loli .head .eye{width:12px;height:14px;background:#222;border-radius:50%;position:absolute;top:38%;z-index:3}
#teacher.loli .head .eye.left{left:22%}
#teacher.loli .head .eye.right{right:22%}
#teacher.loli .head .eye::after{content:'';position:absolute;top:2px;left:2px;width:5px;height:5px;background:#fff;border-radius:50%}
#teacher.loli .head .mouth{width:10px;height:6px;border:2px solid #e8877a;border-top:transparent;border-left:transparent;border-right:transparent;border-radius:0 0 50% 50%;position:absolute;bottom:22%;left:50%;transform:translateX(-50%);z-index:3}
#teacher.loli .head .blush{width:8px;height:5px;background:rgba(255,150,150,0.5);border-radius:50%;position:absolute;top:50%;z-index:3}
#teacher.loli .head .blush.left{left:14%}
#teacher.loli .head .blush.right{right:14%}
#teacher.loli .body-torso{width:clamp(52px,5.5vw,74px);height:clamp(48px,5vw,68px);background:linear-gradient(180deg,#fff 0%,#f0f0f0 100%);border-radius:12px 12px 4px 4px}
#teacher.loli .body-torso .collar{width:70%;height:30%;background:linear-gradient(180deg,#2c5f8a,#1a4a6e);position:absolute;top:0;left:15%;clip-path:polygon(0 0,50% 100%,100% 0);border-radius:0}
#teacher.loli .body-torso .collar::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:14px;height:8px;background:#c0392b;border-radius:2px 2px 0 0}
#teacher.loli .skirt{display:block;width:clamp(58px,6vw,82px);height:clamp(22px,2.2vw,30px);background:linear-gradient(180deg,#2c5f8a,#1a4a6e);margin:0 auto;position:relative;z-index:3;border-radius:0 0 6px 6px;overflow:hidden}
#teacher.loli .skirt::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(90deg,transparent,transparent 6px,rgba(255,255,255,0.15) 6px,rgba(255,255,255,0.15) 8px)}
#teacher.loli .crotch{display:none}
#teacher.loli .arm{width:clamp(14px,1.5vw,20px);height:clamp(38px,4vw,52px);background:#ffdbb5;border-radius:8px;top:-2px}
#teacher.loli .arm.left{left:-22px;transform:rotate(8deg)}
#teacher.loli .arm.right{right:-22px;transform:rotate(-8deg)}
#teacher.loli .arm::before{content:'';position:absolute;top:-2px;left:-4px;right:-4px;height:18px;background:#fff;border-radius:6px 6px 2px 2px;border:1px solid #ddd}
#teacher.loli .legs{display:flex;gap:5px;position:relative;z-index:7;margin-left:8px}
#teacher.loli .leg{width:clamp(14px,1.5vw,20px);height:clamp(60px,6vw,85px);background:#fff;border-radius:6px;position:relative}
#teacher.loli .leg:first-child{transform:rotate(-15deg);transform-origin:top center}
#teacher.loli .leg:last-child{transform:rotate(-10deg);transform-origin:top center}
#teacher.loli .leg::after{content:'';position:absolute;bottom:-6px;left:-4px;width:24px;height:10px;background:#3a1a0a;border-radius:50% 50% 3px 3px;transform:rotate(-5deg)}
#teacher.loli .old-head-style{display:none}
#teacher.loli .loli-head-style{display:block}

/* ===== 老男人模式 ===== */
#teacher.oldman{top:32%}
#teacher.oldman .head{width:clamp(44px,5vw,70px);height:clamp(42px,4.8vw,67px);background:#e8c9a0;border-radius:45% 45% 40% 40%}
#teacher.oldman .head .hair{position:absolute;top:0;left:0;right:0;height:55%;background:linear-gradient(180deg,#333 0%,#444 100%);clip-path:polygon(0 0,25% 0,30% 55%,70% 55%,75% 0,100% 0,100% 60%,0 60%);border-radius:0}
#teacher.oldman .head::before{content:'';position:absolute;top:8%;left:30%;width:40%;height:25%;background:rgba(255,255,200,0.5);border-radius:50%;z-index:2}
#teacher.oldman .head::after{content:'';position:absolute;bottom:30%;left:48%;width:3px;height:8px;background:#222;z-index:3;transform:translateX(-50%) rotate(15deg)}
#teacher.oldman .head .eye{width:8px;height:9px;background:#222;border-radius:50%;position:absolute;top:40%}
#teacher.oldman .head .eye.left{left:25%;width:10px;height:10px}
#teacher.oldman .head .eye.right{right:28%;width:5px;height:6px;top:42%}
#teacher.oldman .head .mouth{width:18px;height:10px;border:2px solid #8B4513;background:#8B4513;border-radius:2px 2px 8px 8px;position:absolute;bottom:18%;left:48%;transform:translateX(-50%) rotate(-3deg);overflow:hidden}
#teacher.oldman .head .mouth::after{content:'';position:absolute;top:-2px;left:2px;width:5px;height:4px;background:#ffeaa7;border-radius:1px;box-shadow:7px 0 0 #ffeaa7}
#teacher.oldman .body-torso{width:clamp(50px,5vw,70px);height:clamp(55px,5.5vw,75px);background:linear-gradient(180deg,#6B8E23 0%,#556B2F 100%);border-radius:30% 30% 0 0}
#teacher.oldman .body-torso .collar{width:55%;height:18%;border-bottom:2px solid #ddd;border-left:2px solid #ddd;border-right:2px solid #ddd;border-radius:0 0 4px 4px;margin:0 auto;position:absolute;top:2px;left:50%;transform:translateX(-50%);background:none;clip-path:none}
#teacher.oldman .body-torso .collar::after{display:none}
#teacher.oldman .body-torso::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:30%;height:20%;background:rgba(100,100,100,0.3);border-radius:50%}
#teacher.oldman .skirt{display:none}
#teacher.oldman .crotch{display:block;width:clamp(50px,5vw,70px);height:clamp(10px,1vw,14px);background:#4a3a2a;margin:0 auto;position:relative;border-radius:0 0 4px 4px}
#teacher.oldman .arm{width:clamp(18px,2vw,26px);height:clamp(44px,4.5vw,60px);background:#6B8E23;border-radius:10px;top:-2px}
#teacher.oldman .arm.left{left:-28px;transform:rotate(12deg)}
#teacher.oldman .arm.right{right:-28px;transform:rotate(-12deg)}
#teacher.oldman .arm::before{display:none}
#teacher.oldman .arm.left::after{content:'';position:absolute;top:-2px;left:50%;width:8px;height:6px;background:#333;border-radius:50%;transform:translateX(-50%)}
#teacher.oldman .arm.right::after{content:'';position:absolute;top:-2px;left:50%;width:8px;height:6px;background:#333;border-radius:50%;transform:translateX(-50%)}
#teacher.oldman .legs{display:flex;gap:6px;position:relative;z-index:7;margin-left:10px}
#teacher.oldman .leg{width:clamp(16px,1.8vw,24px);height:clamp(70px,7vw,100px);background:#4a3a2a;border-radius:6px;position:relative}
#teacher.oldman .leg:first-child{transform:rotate(-15deg);transform-origin:top center}
#teacher.oldman .leg:last-child{transform:rotate(-10deg);transform-origin:top center}
#teacher.oldman .leg::after{content:'';position:absolute;bottom:-8px;left:-6px;width:28px;height:12px;background:#3a2a1a;border-radius:50%;transform:rotate(-5deg)}
#teacher.oldman .old-head-style{display:block}
#teacher.oldman .loli-head-style{display:none}

/* 学生桌子 */
#classroom .student-desk{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);width:clamp(260px,28vw,420px);height:clamp(60px,6vw,80px);background:linear-gradient(180deg,#d4a574 0%,#b8895a 100%);border-radius:6px;box-shadow:0 4px 20px rgba(0,0,0,0.25);z-index:10}
#classroom .student-desk::after{content:'';position:absolute;top:3px;left:6px;right:6px;bottom:0;background:linear-gradient(180deg,rgba(255,255,255,0.12) 0%,transparent 25%)}
#classroom .student-desk .book{position:absolute;top:-12px;right:25%;width:clamp(50px,6vw,80px);height:clamp(36px,3.5vw,45px);background:#f5f5f5;border-radius:3px 8px 8px 3px;border:2px solid #ddd;box-shadow:2px 2px 6px rgba(0,0,0,0.2)}

/* 天花板灯 */
#classroom .lights{position:absolute;top:3%;left:0;right:0;display:flex;justify-content:space-around;padding:0 15%}
#classroom .light{width:clamp(60px,7vw,100px);height:14px;background:linear-gradient(180deg,#ffe8c0 0%,#ffd080 50%,#cc9900 100%);border-radius:7px;box-shadow:0 0 30px rgba(255,220,150,0.5)}
#classroom .window{position:absolute;top:12%;width:clamp(50px,6vw,80px);height:clamp(90px,10vw,130px);background:linear-gradient(180deg,#87CEEB 0%,#5BA3D9 50%,#3d7ea6 100%);border:6px solid #8B7355;border-radius:4px;box-shadow:inset 0 0 15px rgba(255,255,255,0.3)}
#classroom .window.left{left:4%}
#classroom .window.right{right:4%}
#classroom .window::after{content:'';position:absolute;top:0;left:50%;width:3px;height:100%;background:#8B7355;transform:translateX(-50%)}
#classroom .window::before{content:'';position:absolute;left:0;top:50%;width:100%;height:3px;background:#8B7355}

/* 姓名输入界面 */
#name-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:flex;align-items:center;justify-content:center;flex-direction:column}
#name-overlay.hidden{display:none}
#name-box{background:rgba(255,255,255,0.95);border-radius:20px;padding:40px 50px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5);animation:popIn 0.5s cubic-bezier(0.22,1,0.36,1)}
@keyframes popIn{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}
#name-box h2{font-size:28px;color:#333;margin-bottom:8px}
#name-box p{color:#888;font-size:14px;margin-bottom:24px}
#name-input{width:260px;padding:14px 20px;font-size:20px;border:2px solid #ddd;border-radius:12px;text-align:center;outline:none;transition:all 0.3s;font-family:'Noto Sans SC',sans-serif}
#name-input:focus{border-color:#3a5a8c;box-shadow:0 0 15px rgba(58,90,140,0.2)}
/* 老师形象选择 */
#skin-selector{display:flex;gap:16px;justify-content:center;margin:16px 0}
.skin-option{padding:10px 24px;border:2px solid #ddd;border-radius:25px;cursor:pointer;font-size:15px;transition:all 0.3s;font-family:'Noto Sans SC',sans-serif;background:#f9f9f9;color:#666}
.skin-option:hover{border-color:#3a5a8c;color:#3a5a8c}
.skin-option.selected{border-color:#3a5a8c;background:#3a5a8c;color:#fff;box-shadow:0 4px 15px rgba(58,90,140,0.3)}
#name-btn{margin-top:18px;padding:14px 48px;font-size:18px;background:linear-gradient(135deg,#3a5a8c,#2c4a7c);color:#fff;border:none;border-radius:30px;cursor:pointer;letter-spacing:2px;transition:all 0.3s;font-family:'Noto Sans SC',sans-serif}
#name-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(58,90,140,0.4)}

/* 对话框 - 放在老师头顶 */
#dialog{position:absolute;top:14%;right:10%;z-index:50;pointer-events:none;transition:all 0.4s ease}
#dialog-bubble{background:rgba(255,255,255,0.95);border-radius:16px;padding:18px 26px;max-width:380px;box-shadow:0 8px 30px rgba(0,0,0,0.25);position:relative;font-size:16px;color:#333;line-height:1.7;text-align:center;min-width:160px}
#dialog-bubble::after{content:'';position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-top:16px solid rgba(255,255,255,0.95)}
#dialog-name{font-weight:700;color:#c0392b;margin-bottom:4px;font-size:13px}
#dialog-text{font-size:16px;color:#333}
#dialog.hidden{opacity:0;transform:translateX(-50%) translateY(10px);pointer-events:none}

/* 选项面板 */
#choices{position:absolute;bottom:6%;left:50%;transform:translateX(-50%);z-index:60;display:flex;gap:16px;flex-wrap:wrap;justify-content:center;transition:all 0.4s ease}
#choices.hidden{opacity:0;pointer-events:none;transform:translateX(-50%) translateY(20px)}
.choice-btn{padding:14px 32px;font-size:16px;border-radius:30px;border:2px solid #3a5a8c;background:rgba(255,255,255,0.9);color:#3a5a8c;cursor:pointer;transition:all 0.3s;font-family:'Noto Sans SC',sans-serif;white-space:nowrap;pointer-events:auto}
.choice-btn:hover{background:#3a5a8c;color:#fff;transform:translateY(-3px);box-shadow:0 6px 20px rgba(58,90,140,0.3)}
.choice-btn.danger{border-color:#c0392b;color:#c0392b}
.choice-btn.danger:hover{background:#c0392b;color:#fff;box-shadow:0 6px 20px rgba(192,57,43,0.3)}
.choice-btn.cheat{border-color:#f39c12;color:#f39c12;font-size:13px;padding:12px 24px}
.choice-btn.cheat:hover{background:#f39c12;color:#fff;box-shadow:0 6px 20px rgba(243,156,18,0.3)}

/* 文本输入框 */
#text-input-area{display:none;align-items:center;gap:12px;pointer-events:auto}
#text-input-area.show{display:flex}
#text-input-field{padding:12px 20px;font-size:16px;border:2px solid #3a5a8c;border-radius:25px;outline:none;width:300px;font-family:'Noto Sans SC',sans-serif;transition:all 0.3s}
#text-input-field:focus{box-shadow:0 0 15px rgba(58,90,140,0.2)}
#text-submit-btn{padding:12px 28px;font-size:16px;background:#3a5a8c;color:#fff;border:none;border-radius:25px;cursor:pointer;transition:all 0.3s;font-family:'Noto Sans SC',sans-serif}
#text-submit-btn:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(58,90,140,0.4)}

/* 结果弹窗 */
#result-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:center;justify-content:center}
#result-overlay.show{display:flex}
#result-box{background:rgba(255,255,255,0.95);border-radius:20px;padding:40px;text-align:center;max-width:500px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.5);animation:popIn 0.5s cubic-bezier(0.22,1,0.36,1)}
#result-box.success{border:3px solid #27ae60}
#result-box.fail{border:3px solid #c0392b}
#result-box h2{font-size:32px;margin-bottom:16px}
#result-box.success h2{color:#27ae60}
#result-box.fail h2{color:#c0392b}
#result-box p{font-size:16px;color:#555;line-height:1.8;margin-bottom:20px}
#result-box .score{font-size:48px;font-weight:900;margin:16px 0}
#result-box.success .score{color:#27ae60}
#result-box.fail .score{color:#c0392b}
#restart-btn{padding:14px 40px;font-size:16px;background:linear-gradient(135deg,#3a5a8c,#2c4a7c);color:#fff;border:none;border-radius:30px;cursor:pointer;letter-spacing:2px;transition:all 0.3s;font-family:'Noto Sans SC',sans-serif}
#restart-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(58,90,140,0.4)}

/* 血条 - 右上角 */
#health-bar-container{position:absolute;top:20px;right:24px;z-index:80;display:none;align-items:center;gap:10px}
#health-bar-container.show{display:flex}
#health-label{font-size:14px;font-weight:700;color:#333;white-space:nowrap}
#health-bar-bg{width:180px;height:22px;background:#ddd;border-radius:11px;overflow:hidden;box-shadow:inset 0 2px 4px rgba(0,0,0,0.2);border:2px solid #aaa}
#health-bar-fill{height:100%;width:100%;background:linear-gradient(90deg,#e74c3c 0%,#f39c12 30%,#2ecc71 70%,#27ae60 100%);border-radius:9px;transition:width 0.5s ease;position:relative}
#health-bar-fill::after{content:'';position:absolute;top:2px;left:4px;right:4px;height:40%;background:linear-gradient(180deg,rgba(255,255,255,0.4) 0%,transparent 100%);border-radius:4px}
#health-text{font-size:12px;font-weight:900;color:#333;position:absolute;right:10px;top:50%;transform:translateY(-50%)}
#health-bar-bg{position:relative;display:flex;align-items:center}
#health-bar-inner-text{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:11px;font-weight:700;color:#333;z-index:1}

/* 粒子效果 */
.particle{position:absolute;pointer-events:none;animation:particleUp 1.5s ease-out forwards}
@keyframes particleUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-120px) scale(0.3)}}

/* 黑板上Excel图片——只盖黑板，不挡老师 */
#excel-overlay{position:absolute;top:8%;left:50%;transform:translateX(-50%);z-index:2;display:none;animation:fadeIn 0.5s ease;pointer-events:none}
#excel-overlay.show{display:block}
#excel-overlay img{width:clamp(260px,35vw,500px);max-height:28%;object-fit:contain;border-radius:6px;box-shadow:0 8px 30px rgba(0,0,0,0.4)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* 老师跳舞动画 */
@keyframes teacherDance{
  0%{transform:rotate(0deg) translateY(0)}
  25%{transform:rotate(-10deg) translateY(-15px)}
  50%{transform:rotate(0deg) translateY(0)}
  75%{transform:rotate(10deg) translateY(-15px)}
  100%{transform:rotate(0deg) translateY(0)}
}
#teacher.dancing{animation:teacherDance 0.6s ease-in-out infinite}
#teacher.dancing .arm.left{animation:armWaveL 0.6s ease-in-out infinite}
#teacher.dancing .arm.right{animation:armWaveR 0.6s ease-in-out infinite}
@keyframes armWaveL{
  0%{transform:rotate(8deg)}
  50%{transform:rotate(-30deg)}
  100%{transform:rotate(8deg)}
}
@keyframes armWaveR{
  0%{transform:rotate(-8deg)}
  50%{transform:rotate(30deg)}
  100%{transform:rotate(-8deg)}
}

function selectSkin(skin) {
  teacherSkin = skin;
  document.querySelectorAll('.skin-option').forEach(opt => opt.classList.remove('selected'));
  document.querySelector(`.skin-option[data-skin="${skin}"]`).classList.add('selected');
}

function applyTeacherSkin(skin) {
  const teacher = document.getElementById('teacher');
  teacher.className = skin;
}

    return;

  if (!tName) {
    teacherInput.focus();
    teacherInput.style.borderColor = '#c0392b';

    return;
  }
  teacherName = tName;
  applyTeacherSkin(teacherSkin);

        overlay.classList.add('show');
        hideDialog();
        document.getElementById('health-bar-container').classList.remove('show');
      }, 2500);
    }, 500);
    return;
  }
  
  currentRound = 1;
  wordQuestionIndex = 0;
  gameActive = true;
  document.getElementById('name-overlay').classList.add('hidden');
  document.getElementById('health-bar-container').classList.add('show');
  updateHealthBar();
  document.getElementById('text-input-field').placeholder = '输入课文内容...';

  setTimeout(() => {
    showDialog(teacherName, `${playerName}，来背书。`);
    setTimeout(() => {
      showDialog(teacherName, '把《阿房宫赋》背一遍。');
      setTimeout(() => showChoices(), 1200);
    }, 2000);
  }, 500);
}

function showDialog(name, text) {
  const dialog = document.getElementById('dialog');
  document.getElementById('dialog-name').textContent = name;
  document.getElementById('dialog-text').textContent = text;
  dialog.classList.remove('hidden');
}

function hideDialog() { document.getElementById('dialog').classList.add('hidden'); }

function showChoices() {
  document.getElementById('choices').classList.remove('hidden');
  document.getElementById('text-input-area').classList.add('show');
}
function hideChoices() {
  document.getElementById('choices').classList.add('hidden');
  document.getElementById('text-input-area').classList.remove('show');
}

function updateHealthBar() {
  document.getElementById('health-bar-fill').style.width = score + '%';
  document.getElementById('health-bar-inner-text').textContent = score + '/100';
  const fill = document.getElementById('health-bar-fill');
  if (score > 60) fill.style.background = 'linear-gradient(90deg, #f39c12 0%, #2ecc71 70%, #27ae60 100%)';
  else if (score > 30) fill.style.background = 'linear-gradient(90deg, #e74c3c 0%, #f39c12 50%, #f1c40f 100%)';
  else fill.style.background = 'linear-gradient(90deg, #c0392b 0%, #e74c3c 50%, #e74c3c 100%)';
}

function deductScore(amount) { score = Math.max(0, score - amount); updateHealthBar(); }

function showWordChoices() {
  document.getElementById('choices-round2').classList.remove('hidden');
  document.getElementById('round2-input-area').classList.add('show');
}
function hideWordChoices() {
  document.getElementById('choices-round2').classList.add('hidden');
  document.getElementById('round2-input-area').classList.remove('show');
}

function playFailDialogues(callback) {
  hideChoices(); hideWordChoices(); hideDialog();
  let step = 0;
  const dialogues = [
    `"${playerName}，没背？"`,
    `"课代表，把${playerName}名字记下来，扣他个三分。"`,
    '"我这是多久以前布置的作业了……"'
  ];
  function nextLine() {
    if (step < dialogues.length) {
      deductScore(3);
      showDialog(teacherName, dialogues[step]);
      step++;
      setTimeout(nextLine, 2000);
    } else setTimeout(callback, 1500);
  }
  nextLine();
}

function chooseForgot() {
  if (!gameActive) return;
  gameActive = false;
  playFailDialogues(() => { if(score<=0){showResult('fail','平时成绩扣光了！');return;} startWordRound(0); });
}

function chooseSilent() {
  if (!gameActive) return;
  gameActive = false;
  playFailDialogues(() => { if(score<=0){showResult('fail','平时成绩扣光了！');return;} startWordRound(0); });
}

// ===== 作弊逻辑 =====
function chooseCheat() {
  if (!gameActive) return;
  gameActive = false;
  hideChoices();
  if (Math.random() < 0.8) {
    // 被发现
    let step = 0;
    const lines = ['搞清楚你要干什么？', '都什么时候了还在这里看！', '扣20分！'];
    function nextLine() {
      if (step < lines.length) {
        showDialog(teacherName, lines[step]);
        step++;
        if (step === 3) { deductScore(20); }
        setTimeout(nextLine, 2000);
      } else {
        if (score <= 0) { showResult('fail', '作弊被抓，平时成绩扣光了！'); return; }
        startWordRound(0);
      }
    }
    nextLine();
  } else {
    // 没被发现，顺利通过
    showDialog(teacherName, `很好！${playerName}，背得非常熟练！`);
    spawnParticles();
    setTimeout(() => startWordRound(0), 3000);
  }
}

function chooseWordCheat() {
  if (!gameActive) return;
  gameActive = false;
  hideWordChoices();
  if (Math.random() < 0.5) {
    // 被发现
    let step = 0;
    const lines = ['搞清楚你要干什么？', '都什么时候了还在这里看！', '扣10分！'];
    function nextLine() {
      if (step < lines.length) {
        showDialog(teacherName, lines[step]);
        step++;
        if (step === 3) { deductScore(10); }
        setTimeout(nextLine, 2000);
      } else {
        if (score <= 0) { showResult('fail', '作弊被抓，平时成绩扣光了！'); return; }
        if (wordQuestionIndex < WORD_QUESTIONS.length - 1) {
          startWordRound(wordQuestionIndex + 1);
        } else {
          startQuoteStorm();
        }
      }
    }
    nextLine();
  } else {
    // 没被发现，顺利通过
    const q = WORD_QUESTIONS[wordQuestionIndex];
    showDialog(teacherName, `不错！${playerName}，${q.correctMsg}`);
    spawnParticles();
    setTimeout(() => {
      if (score <= 0) { showResult('fail', '平时成绩扣光了！'); return; }
      if (wordQuestionIndex < WORD_QUESTIONS.length - 1) {
        startWordRound(wordQuestionIndex + 1);
      } else {
        startQuoteStorm();
      }
    }, 2500);
  }
}

// ===== 第一轮：背诵提交 =====
function checkRecite() {
  if (!gameActive) return;
  const input = document.getElementById('text-input-field').value.trim();
  if (!input) {
    document.getElementById('text-input-field').focus();
    document.getElementById('text-input-field').style.borderColor = '#c0392b';
    setTimeout(() => document.getElementById('text-input-field').style.borderColor = '#3a5a8c', 1000);
    return;
  }
  gameActive = false;
  hideChoices();
  hideDialog();
  document.getElementById('text-input-field').value = '';

  if (currentRound === 1) {
    const ni = input.replace(/\s+/g, ''), ne = EXPECTED_TEXT.replace(/\s+/g, '');
    if (ni === ne) {
      showDialog(teacherName, `很好！${playerName}，背得非常熟练！`);
      spawnParticles();
      setTimeout(() => startWordRound(0), 3000);
    } else {
      playFailDialogues(() => { if(score<=0){showResult('fail','背错课文，平时成绩扣光了！');return;} startWordRound(0); });
    }
  }
}

// ===== 字词解释轮（rounds 2,3,4）=====
function startWordRound(idx) {
  wordQuestionIndex = idx;
  currentRound = 2 + idx; // round 2,3,4
  const q = WORD_QUESTIONS[idx];
  gameActive = true;
  hideDialog(); hideChoices(); hideWordChoices();
  document.getElementById('excel-overlay').classList.add('show');
  document.querySelector('.blackboard-text').style.display = 'none';
  document.getElementById('round2-input-field').placeholder = `输入"${q.word}"的意思...`;
  document.getElementById('round2-input-field').value = '';

  setTimeout(() => {
    showDialog(teacherName, idx === 0 ? '他涂黑，看清楚了。' : '好，继续看黑板。');
    setTimeout(() => {
      showDialog(teacherName, `${playerName}，"${q.word}"是什么意思？`);
      showWordChoices();
      document.getElementById('round2-input-field').focus();
    }, 2000);
  }, 600);
}

function checkWord() {
  if (!gameActive) return;
  const input = document.getElementById('round2-input-field').value.trim();
  if (!input) {
    document.getElementById('round2-input-field').focus();
    document.getElementById('round2-input-field').style.borderColor = '#c0392b';
    setTimeout(() => document.getElementById('round2-input-field').style.borderColor = '#3a5a8c', 1000);
    return;
  }
  gameActive = false;
  hideWordChoices(); hideDialog();
  document.getElementById('round2-input-field').value = '';

  const q = WORD_QUESTIONS[wordQuestionIndex];
  // 字字落实：必须精确匹配答案，不能模糊
  const isCorrect = (input === q.answer);

  if (isCorrect) {
    showDialog(teacherName, `不错！${playerName}，${q.correctMsg}`);
    spawnParticles();
  } else {
    deductScore(3);
    showDialog(teacherName, `${q.wrongMsg} 扣3分！`);
  }

  // 进入下一题或结束
  setTimeout(() => {
    if (score <= 0) { showResult('fail', '平时成绩扣光了！'); return; }
    if (wordQuestionIndex < WORD_QUESTIONS.length - 1) {
      startWordRound(wordQuestionIndex + 1);
    } else {
      // 所有字词解释完成，进入语录轰炸
      startQuoteStorm();
    }
  }, 2500);
}

function chooseWordForgot() {
  if (!gameActive) return;
  gameActive = false;
  hideWordChoices(); hideDialog();
  const q = WORD_QUESTIONS[wordQuestionIndex];
  deductScore(3);
  showDialog(teacherName, `${q.wrongMsg} 扣3分！`);
  setTimeout(() => {
    if (score <= 0) { showResult('fail', '平时成绩扣光了！'); return; }
    if (wordQuestionIndex < WORD_QUESTIONS.length - 1) {
      startWordRound(wordQuestionIndex + 1);
    } else {
      startQuoteStorm();
    }
  }, 2500);
}

function chooseWordSilent() {
  if (!gameActive) return;
  gameActive = false;
  hideWordChoices(); hideDialog();
  const q = WORD_QUESTIONS[wordQuestionIndex];
  deductScore(3);
  showDialog(teacherName, `${q.wrongMsg} 扣3分！`);
  setTimeout(() => {
    if (score <= 0) { showResult('fail', '平时成绩扣光了！'); return; }
    if (wordQuestionIndex < WORD_QUESTIONS.length - 1) {
      startWordRound(wordQuestionIndex + 1);
    } else {
      startQuoteStorm();
    }
  }, 2500);
}

// ===== 语录轰炸 =====
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuoteStorm() {
  quoteIndex = 0;
  selectedQuotes = shuffleArray(TEACHER_QUOTES).slice(0, 15);
  gameActive = true;
  hideDialog(); hideChoices(); hideWordChoices();
  document.getElementById('excel-overlay').classList.remove('show');
  document.querySelector('.blackboard-text').style.display = '';
  document.querySelector('.blackboard-text').textContent = '语录轰炸';
  
  setTimeout(() => {
    showDialog(teacherName, '哼，字词解释完了是吧？');
    setTimeout(() => {
      showDialog(teacherName, '别以为这就完了，我话还没说完呢。');
      setTimeout(() => showNextQuote(), 1500);
    }, 2000);
  }, 600);
}

function showNextQuote() {
  if (quoteIndex >= selectedQuotes.length) {
    // 10句语录放完，进入扣分环节
    startFinalDeduction();
    return;
  }
  
  const quote = selectedQuotes[quoteIndex];
  showDialog(teacherName, quote);
  quoteIndex++;
  setTimeout(() => showNextQuote(), 1800);
}

function startFinalDeduction() {
  hideDialog();
  document.querySelector('.blackboard-text').textContent = '扣分时间';
  
  setTimeout(() => {
    showDialog(teacherName, `${playerName}，不要扯别的，只许州官放火不许百姓点灯。扣三分！`);
    deductScore(3);
    setTimeout(() => {
      if (score <= 0) { startSingerQuestion(); return; }
      showDialog(teacherName, `${playerName}，不行啦！扣三分！`);
      deductScore(3);
      setTimeout(() => {
        startSingerQuestion();
      }, 2000);
    }, 2000);
  }, 1000);
}

// ===== 歌手问答 =====
function startSingerQuestion() {
  gameActive = true;
  hideDialog(); hideChoices(); hideWordChoices();
  document.getElementById('excel-overlay').classList.remove('show');
  document.querySelector('.blackboard-text').style.display = '';
  document.querySelector('.blackboard-text').textContent = '歌手问答';
  document.getElementById('singer-input-field').value = '';

  setTimeout(() => {
    showDialog(teacherName, `${playerName}，你最喜欢的歌手是谁？`);
    document.getElementById('singer-area').classList.remove('hidden');
    document.getElementById('singer-area').style.display = 'flex';
    document.getElementById('singer-input-field').focus();
  }, 800);
}

function checkSinger() {
  if (!gameActive) return;
  const input = document.getElementById('singer-input-field').value.trim();
  if (!input) {
    document.getElementById('singer-input-field').focus();
    document.getElementById('singer-input-field').style.borderColor = '#c0392b';
    setTimeout(() => document.getElementById('singer-input-field').style.borderColor = '#3a5a8c', 1000);
    return;
  }
  gameActive = false;
  document.getElementById('singer-area').style.display = 'none';
  document.getElementById('singer-area').classList.add('hidden');
  document.getElementById('singer-input-field').value = '';
  hideDialog();

  if (input === '邓丽君') {
    score = 100;
    updateHealthBar();
    showDialog(teacherName, `平时成绩100分！`);
    setTimeout(() => {
      showDialog(teacherName, '还是邓丽君好！');
      setTimeout(() => startDance(), 1500);
    }, 2000);
  } else if (input === '王菲') {
    score -= 100;
    updateHealthBar();
    showDialog(teacherName, '我不喜欢王菲。');
    setTimeout(() => {
      showDialog(teacherName, '扣你100分。');
      setTimeout(() => {
        showDialog(teacherName, '没有邓丽君好。');
        setTimeout(() => {
          showDialog(teacherName, '还是邓丽君好！');
          setTimeout(() => startDance(), 1500);
        }, 1500);
      }, 2000);
    }, 2000);
  } else if (input === '张信哲') {
    score -= 50;
    updateHealthBar();
    showDialog(teacherName, '我不是很喜欢张信哲。');
    setTimeout(() => {
      showDialog(teacherName, '扣你50分。');
      setTimeout(() => {
        showDialog(teacherName, '没有邓丽君好。');
        setTimeout(() => {
          showDialog(teacherName, '还是邓丽君好！');
          setTimeout(() => startDance(), 1500);
        }, 1500);
      }, 2000);
    }, 2000);
  } else if (input === '周杰伦') {
    score -= 50;
    updateHealthBar();
    showDialog(teacherName, '我不是很喜欢周杰伦。');
    setTimeout(() => {
      showDialog(teacherName, '扣你50分。');
      setTimeout(() => {
        showDialog(teacherName, '没有邓丽君好。');
        setTimeout(() => {
          showDialog(teacherName, '还是邓丽君好！');
          setTimeout(() => startDance(), 1500);
        }, 1500);
      }, 2000);
    }, 2000);
  } else {
    showDialog(teacherName, '没有邓丽君好。');
    setTimeout(() => {
      showDialog(teacherName, '还是邓丽君好！');
      setTimeout(() => startDance(), 1500);
    }, 2000);
  }
}

function startDance() {
  hideDialog();
  const teacher = document.getElementById('teacher');
  teacher.classList.add('dancing');
  document.querySelector('.blackboard-text').textContent = '春花秋月何时了';
  
  let danceStep = 0;
  const danceLines = ['春花秋月何时了', '往事知多少。'];
  const danceInterval = setInterval(() => {
    document.querySelector('.blackboard-text').textContent = danceLines[danceStep % 2];
    danceStep++;
  }, 2000);

  setTimeout(() => {
    clearInterval(danceInterval);
    teacher.classList.remove('dancing');
    document.querySelector('.blackboard-text').textContent = '平时成绩保卫战';
    showFinalResult();
  }, 10000);
}

function showFinalResult() {
  gameActive = false;
  hideDialog(); hideChoices(); hideWordChoices();
  document.getElementById('singer-area').style.display = 'none';
  document.getElementById('singer-area').classList.add('hidden');
  document.getElementById('excel-overlay').classList.remove('show');
  document.querySelector('.blackboard-text').style.display = '';
  document.querySelector('.blackboard-text').textContent = '平时成绩保卫战';
  
  const overlay = document.getElementById('result-overlay');
  const box = document.getElementById('result-box');
  box.className = score > 0 ? 'success' : 'fail';
  document.getElementById('result-title').textContent = '游戏结束';
  document.getElementById('result-score').textContent = '你还剩 ' + score + ' 分';
  document.getElementById('result-msg').textContent = '';
  overlay.classList.add('show');
}

// ===== 工具函数 =====
function spawnParticles() {
  const container = document.getElementById('game-container');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = ['⭐','✨','🌟','💫','🎉'][Math.floor(Math.random()*5)];
    p.style.left = (30 + Math.random() * 40) + '%';
    p.style.top = (40 + Math.random() * 20) + '%';
    p.style.fontSize = (16 + Math.random() * 28) + 'px';
    p.style.animationDelay = (Math.random() * 0.8) + 's';
    container.appendChild(p);
    setTimeout(() => p.remove(), 2500);
  }
}

function showResult(type, msg) {
  gameActive = false;
  const overlay = document.getElementById('result-overlay');
  const box = document.getElementById('result-box');
  box.className = type;
  document.getElementById('result-title').textContent = type === 'success' ? '挑战成功！' : '挑战失败';
  document.getElementById('result-score').textContent = '平时成绩：' + score;
  document.getElementById('result-msg').textContent = msg;
  overlay.classList.add('show');
  hideDialog(); hideChoices(); hideWordChoices();
  document.getElementById('excel-overlay').classList.remove('show');
  document.querySelector('.blackboard-text').style.display = '';
}

function restartGame() {
  score = 100; gameActive = false; currentRound = 0; wordQuestionIndex = 0; quoteIndex = 0; selectedQuotes = [];
  teacherSkin = 'loli';
  selectSkin('loli');
  applyTeacherSkin('loli');
  updateHealthBar();
  document.getElementById('result-overlay').classList.remove('show');
  document.getElementById('text-input-field').value = '';
  document.getElementById('round2-input-field').value = '';
  document.getElementById('singer-input-field').value = '';
  document.getElementById('singer-area').style.display = 'none';
  document.getElementById('singer-area').classList.add('hidden');
  document.getElementById('excel-overlay').classList.remove('show');
  document.getElementById('teacher').classList.remove('dancing');
  document.querySelector('.blackboard-text').style.display = '';
  document.querySelector('.blackboard-text').textContent = '平时成绩保卫战';
  hideDialog(); hideChoices(); hideWordChoices();
  document.getElementById('name-overlay').classList.remove('hidden');
  document.getElementById('name-input').value = '';
  document.getElementById('teacher-name-input').value = '';
  document.getElementById('health-bar-container').classList.remove('show');
}

document.getElementById('name-input').addEventListener('keydown', e => { if(e.key==='Enter')startGame(); });
document.getElementById('teacher-name-input').addEventListener('keydown', e => { if(e.key==='Enter')startGame(); });
document.getElementById('text-input-field').addEventListener('keydown', e => { if(e.key==='Enter')checkRecite(); });
document.getElementById('round2-input-field').addEventListener('keydown', e => { if(e.key==='Enter')checkWord(); });
document.getElementById('singer-input-field').addEventListener('keydown', e => { if(e.key==='Enter')checkSinger(); });
</script>
